<!doctype html>
<html lang="sw">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Kalour Beauty Empire</title>
    <meta
      name="description"
      content="Kalour Beauty Empire — luxury cosmetics, signature perfumes, and shoes in Dar es Salaam."
    />
    <script>
      // Applied before React mounts so a saved dark preference doesn't
      // flash light-then-dark on reload. Light stays the default.
      if (localStorage.getItem("kalour_theme") === "dark") {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
